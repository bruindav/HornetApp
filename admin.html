<!-- admin.html — Fix 14 — Gebruikersbeheer (alleen admins) -->
<!DOCTYPE html>
<html lang="nl">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>HornetApp – Beheer</title>
  <link rel="icon" href="./favicon.ico"/>
</head>
<body>
  <div style="padding:40px;font-family:system-ui;color:#334155">Laden…</div>
  <script type="module">
    import { auth } from './firebase.js';
    import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js';
    import { bootAdmin } from './admin.js';

    onAuthStateChanged(auth, (user) => {
      if (user) {
        bootAdmin();
      } else {
        document.body.innerHTML = `
          <div style="padding:40px;font-family:system-ui">
            <p>Je moet ingelogd zijn om deze pagina te bekijken.</p>
            <a href="/">← Terug naar login</a>
          </div>`;
      }
    });
  </script>
</body>
</html>
