<!DOCTYPE html>
<html lang="nl">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>HornetApp</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="icon" href="./favicon.ico" />
    <link rel="stylesheet" href="./app.css" />

    <!-- Leaflet & Geoman (volgorde is belangrijk) -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <link rel="stylesheet" href="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.css" />
    <script src="https://unpkg.com/@geoman-io/leaflet-geoman-free@latest/dist/leaflet-geoman.min.js"></script>

    <style>
      :root { --header-h: 58px; }
      body { margin:0; font-family: system-ui, Arial, sans-serif; }
      header { position: sticky; top:0; z-index: 5; background:#0f172a; color:#fff; padding:10px 12px; display:flex; align-items:center; gap:8px; }
      header .spacer { flex:1; }
      .app { display:flex; min-height: calc(100vh - var(--header-h)); }
      .sidebar { width: 300px; background:#f1f5f9; border-right:1px solid #cbd5e1; padding:12px; overflow:auto; transition: width 0.25s ease, padding 0.25s ease, opacity 0.25s ease; }
      .sidebar-collapsed .sidebar { width: 0; padding: 0; overflow: hidden; opacity: 0; }
      .content { flex:1; position:relative; }
      #map { position: absolute; inset: 0; }
      .hidden { display:none !important; }
      .ctx-menu { position:fixed; background:#fff; border:1px solid #cbd5e1; border-radius:6px; padding:8px; box-shadow:0 6px 24px rgba(15,23,42,.15); z-index: 9999; }
      .poly-label { background:#fff; border:2px solid #0aa879; color:#111; font-weight:600; }
      .line-label { background:#111; color:#fff; border:0; }
      .line-handle div { width:12px; height:12px; border-radius:50%; background:#111; border:2px solid #fff; box-shadow:0 0 0 2px #111; }
      .login { display:grid; place-items:center; min-height: 70vh; }
      .login .card { padding:24px; border:1px solid #e2e8f0; border-radius:8px; }
      .status { font-size: 12px; color:#475569; }
      .grid { display:grid; gap:8px; }
      .only-hoornaar { display:none; grid-template-columns: 1fr 1fr; gap:8px; }
    </style>
  </head>
  <body>
    <!-- Login screen -->
    <section id="login-screen" class="login">
      <div class="card" style="min-width:320px;max-width:420px;width:90%">
        <h2 style="margin:0 0 4px">🐝 HornetApp</h2>
        <p style="margin:0 0 20px;color:#64748b;font-size:14px">Aziatische hoornaar monitoring</p>

        <!-- Tabs -->
        <div style="display:flex;border-bottom:2px solid #e2e8f0;margin-bottom:20px">
          <button id="tab-login" class="active" style="flex:1;padding:8px;border:0;background:none;cursor:pointer;font-weight:600;color:#0aa879;border-bottom:2px solid #0aa879;margin-bottom:-2px">Inloggen</button>
          <button id="tab-register" style="flex:1;padding:8px;border:0;background:none;cursor:pointer;color:#64748b">Registreren</button>
        </div>

        <!-- Foutmelding -->
        <div id="login-error" class="hidden" style="background:#fee2e2;color:#991b1b;padding:8px 12px;border-radius:6px;font-size:13px;margin-bottom:12px"></div>

        <!-- Inloggen panel -->
        <div id="panel-login">
          <div class="grid">
            <input id="login-email" type="email" placeholder="E-mailadres" style="padding:8px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px"/>
            <input id="login-pass" type="password" placeholder="Wachtwoord" style="padding:8px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px"/>
            <button id="btn-login-email" style="padding:9px;background:#0aa879;color:#fff;border:0;border-radius:6px;font-weight:600;cursor:pointer">Inloggen</button>
            <button id="btn-forgot" style="background:none;border:0;color:#64748b;font-size:13px;cursor:pointer;text-align:left;padding:0">Wachtwoord vergeten?</button>
            <hr style="border:0;border-top:1px solid #e2e8f0;margin:4px 0"/>
            <button class="btn-google" style="padding:9px;background:#fff;border:1px solid #cbd5e1;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"/> Inloggen met Google
            </button>
          </div>
        </div>

        <!-- Registreren panel -->
        <div id="panel-register" class="hidden">
          <div class="grid">
            <input id="reg-email" type="email" placeholder="E-mailadres" style="padding:8px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px"/>
            <input id="reg-pass" type="password" placeholder="Wachtwoord (min. 6 tekens)" style="padding:8px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px"/>
            <input id="reg-pass2" type="password" placeholder="Wachtwoord herhalen" style="padding:8px 10px;border:1px solid #cbd5e1;border-radius:6px;font-size:14px"/>
            <button id="btn-register-email" style="padding:9px;background:#0aa879;color:#fff;border:0;border-radius:6px;font-weight:600;cursor:pointer">Account aanmaken</button>
            <hr style="border:0;border-top:1px solid #e2e8f0;margin:4px 0"/>
            <button class="btn-google" style="padding:9px;background:#fff;border:1px solid #cbd5e1;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-size:14px">
              <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" width="18"/> Registreren met Google
            </button>
          </div>
        </div>

        <p class="status" style="margin-top:16px"><span id="status-sw">SW:</span> · <span id="status-geo">Geo:</span></p>
      </div>
    </section>

    <!-- App shell -->
    <section id="app-shell" class="hidden">
      <header>
        <button id="toggle-sidebar">☰</button>
        <strong>HornetApp</strong>
        <div class="spacer"></div>
        <div style="display:flex;gap:8px;align-items:center;font-size:13px">
          <span id="hdr-role" style="opacity:.85"></span>
          <span id="hdr-scope-wrap" class="hidden">📍 <span id="hdr-scope">–</span></span>
        </div>
        <button id="btn-admin" class="hidden" style="margin-left:12px">⚙️ Beheer</button>
        <button id="logoutBtn" style="margin-left:12px">Uitloggen</button>
        <button id="btn-reset-cache" title="Reset cache & herladen" style="margin-left:8px">↺</button>
      </header>
      <div class="app">
        <aside class="sidebar">
          <div id="sidebar-userblock" style="padding:6px 2px 10px;border-bottom:1px solid #cbd5e1;margin-bottom:10px;font-size:13px;color:#475569;display:none">
            👤 <span id="hdr-user"></span>
          </div>
          <h3>Scope</h3>
          <div class="grid">
            <label>Jaar <select id="sel-year"></select></label>
            <label>Gebied <input id="sel-group" list="groups" placeholder="Hoornaar_Zeist"/></label>
            <datalist id="groups"><option value="Hoornaar_Zeist"></option></datalist>
            <button id="apply-scope">Toepassen</button>
          </div>

          <h3 style="margin-top:16px">Filters</h3>
          <div class="grid">
            <label><input type="checkbox" id="f_type_hoornaar" checked/> Waarneming</label>
            <label><input type="checkbox" id="f_type_nest" checked/> Nest</label>
            <label><input type="checkbox" id="f_type_nest_geruimd" checked/> Nest geruimd</label>
            <label><input type="checkbox" id="f_type_lokpot" checked/> Lokpot (incl. lijnen)</label>
            <label><input type="checkbox" id="f_type_pending" checked/> Pending</label>
            <label>Datum vóór <input type="date" id="f_date_before"/></label>
            <div style="display:flex; gap:8px">
              <button id="apply-filters">Toepassen</button>
              <button id="reset-filters">Reset</button>
            </div>
            <label><input type="checkbox" id="hard-debounce"/> Stabiele interactie (traag)</label>
          </div>


        </aside>
        <div class="content">
          <div id="map"></div>
        </div>
      </div>

      <!-- Backdrop for mobile sidebar -->
      <div id="sidebar-backdrop" class="hidden" aria-hidden="true"></div>

      <!-- Properties modal -->
      <!-- Icoon eigenschappen modal -->
      <div id="prop-modal" class="hidden" role="dialog" aria-modal="true" style="position:fixed;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.4);z-index:8000">
        <div style="background:#fff;padding:20px;border-radius:10px;min-width:300px;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.25)">
          <h3 id="pm-title" style="margin:0 0 16px;font-size:15px"></h3>
          <div class="grid">
            <label style="font-size:13px">Datum <input id="pm-date" type="date" style="width:100%;padding:6px;border:1px solid #cbd5e1;border-radius:5px"/></label>
            <label style="font-size:13px">Door <input id="pm-by" style="width:100%;padding:6px;border:1px solid #cbd5e1;border-radius:5px"/></label>
            <div class="only-hoornaar">
              <label style="font-size:13px">Aantal <input id="pm-amount" type="number" min="0" style="width:100%;padding:6px;border:1px solid #cbd5e1;border-radius:5px"/></label>
            </div>
            <div id="pm-sender-row" style="display:none">
              <label style="font-size:13px;display:flex;align-items:center;gap:10px;padding:6px 0">
                Goed voor zenderactie?
                <label style="display:flex;align-items:center;gap:4px;font-weight:normal"><input type="radio" name="pm-sender" id="pm-sender-ja" value="ja"/> Ja</label>
                <label style="display:flex;align-items:center;gap:4px;font-weight:normal"><input type="radio" name="pm-sender" id="pm-sender-nee" value="nee" checked/> Nee</label>
              </label>
            </div>
            <label id="pm-note-row" style="font-size:13px;display:block">
              Opmerking <textarea id="pm-note" rows="3" style="width:100%;padding:6px;border:1px solid #cbd5e1;border-radius:5px;resize:vertical;font-family:inherit;font-size:13px" placeholder="Bijv. hoogte nest, gedrag..."></textarea>
            </label>
            <label id="pm-color-row" class="hidden" style="font-size:13px;display:flex;align-items:center;gap:8px">
              Kleur gebied <input id="pm-color" type="color" style="width:48px;height:32px;border:1px solid #cbd5e1;border-radius:5px;cursor:pointer;padding:2px"/>
            </label>
            <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:4px">
              <button id="pm-cancel" style="padding:7px 14px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;cursor:pointer">Annuleren</button>
              <button id="pm-save" style="padding:7px 14px;border:0;border-radius:6px;background:#0aa879;color:#fff;font-weight:600;cursor:pointer">Opslaan</button>
            </div>
          </div>
        </div>
      </div>

      <!-- Polygon kleur modal (apart voor bestaande polygonen) -->
      <div id="color-modal" class="hidden" role="dialog" aria-modal="true" style="position:fixed;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.4);z-index:8000">
        <div style="background:#fff;padding:20px;border-radius:10px;min-width:260px;box-shadow:0 8px 32px rgba(0,0,0,.25)">
          <h3 style="margin:0 0 16px;font-size:15px">Kleur gebied</h3>
          <input id="cm-color" type="color" style="width:100%;height:48px;border:1px solid #cbd5e1;border-radius:6px;cursor:pointer;padding:3px"/>
          <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
            <button id="cm-cancel" style="padding:7px 14px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;cursor:pointer">Annuleren</button>
            <button id="cm-save" style="padding:7px 14px;border:0;border-radius:6px;background:#0aa879;color:#fff;font-weight:600;cursor:pointer">Opslaan</button>
          </div>
        </div>
      </div>

      <!-- Zichtlijn opmerking modal -->
      <div id="line-note-modal" class="hidden" role="dialog" aria-modal="true" style="position:fixed;inset:0;display:grid;place-items:center;background:rgba(0,0,0,.4);z-index:8000">
        <div style="background:#fff;padding:20px;border-radius:10px;min-width:300px;max-width:380px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,.25)">
          <h3 style="margin:0 0 12px;font-size:15px">📝 Opmerking zichtlijn</h3>
          <textarea id="lnm-note" rows="4" style="width:100%;padding:8px;border:1px solid #cbd5e1;border-radius:6px;font-family:inherit;font-size:13px;resize:vertical" placeholder="Bijv. wat je hebt waargenomen..."></textarea>
          <div style="display:flex;justify-content:flex-end;gap:8px;margin-top:12px">
            <button id="lnm-cancel" style="padding:7px 14px;border:1px solid #cbd5e1;border-radius:6px;background:#fff;cursor:pointer">Annuleren</button>
            <button id="lnm-save" style="padding:7px 14px;border:0;border-radius:6px;background:#0aa879;color:#fff;font-weight:600;cursor:pointer">Opslaan</button>
          </div>
        </div>
      </div>
    </section>

    <!-- App entry (auth-gated) -->
    <script type="module" src="./main.js?v=610r21f17"></script>
  </body>
</html>
